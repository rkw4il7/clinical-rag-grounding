name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Compile sources
        run: uv run python -m compileall -q src tests scripts

      # Offline suite only. Live tests (@pytest.mark.live) need Postgres/pgvector
      # and a local OpenAI-compatible LLM; they are run manually, not in CI.
      - name: Offline tests
        run: uv run pytest -m "not live"
